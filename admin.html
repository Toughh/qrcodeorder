<!DOCTYPE html>
<html>

<head>

  <title>Kitchen Live Orders</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .order {
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      margin-bottom: 15px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .order:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .pending {
      background: #facc15;
      color: black;
    }

    .accepted {
      background: #3b82f6;
    }

    .ready {
      background: #22c55e;
    }

    .order pre {
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 6px;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Button Colors */
    button:nth-child(1) {
      background: #3b82f6;
      color: white;
    }

    button:nth-child(2) {
      background: #ef4444;
      color: white;
    }

    button:nth-child(3) {
      background: #22c55e;
      color: white;
    }

    button:nth-child(4) {
      background: #6b7280;
      color: white;
    }

    @keyframes flash {
      0% {
        box-shadow: 0 0 5px red;
      }

      50% {
        box-shadow: 0 0 20px red;
      }

      100% {
        box-shadow: 0 0 5px red;
      }
    }

    .newOrder {
      animation: flash 1s infinite;
    }

    /* Layout */
    .kitchen {
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }

    /* Desktop */
    @media (min-width: 900px) {
      .kitchen {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    .kitchen>div {
      min-width: 300px;
      height: 75vh;
      display: flex;
      flex-direction: column;
      background: #1f1f1f;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Scroll inside column */
    .kitchen>div>div {
      overflow-y: auto;
      flex: 1;
      padding-right: 5px;
    }

    /* Sticky headers */
    .kitchen h2 {
      position: sticky;
      top: 0;
      background: #1f1f1f;
      padding: 5px 0;
      z-index: 2;
    }

    /* Scrollbar */
    .kitchen>div>div::-webkit-scrollbar {
      width: 6px;
    }

    .kitchen>div>div::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 10px;
    }
  </style>

</head>

<body>

  <h2>🍽️ Kitchen Dashboard</h2>

  <div class="kitchen">

    <div>
      <h2>Pending</h2>
      <div id="pending"></div>
    </div>

    <div>
      <h2>Cooking</h2>
      <div id="accepted"></div>
    </div>

    <div>
      <h2>Ready</h2>
      <div id="ready"></div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    window.adminToken = params.get("token");

    if (!window.adminToken) {
      document.body.innerHTML = "<h2>Invalid Admin Access</h2>";
      throw new Error("No token");
    }
  </script>

  <script src="admin.js"></script>

  <audio id="newOrderSound">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>

</body>

</html>
