<!DOCTYPE html>
<html>
<head>
<title>Kitchen Orders</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

#orders{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.order{
padding:20px;
border-radius:10px;
font-size:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.pending{
background:#facc15;
color:black;
}

.accepted{
background:#3b82f6;
}

.ready{
background:#22c55e;
}

.order pre{
background:rgba(0,0,0,0.2);
padding:10px;
border-radius:6px;
}

button{
margin-top:10px;
margin-right:10px;
padding:8px 14px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h2>Live Orders</h2>

<div id="orders"></div>

<script src="admin.js"></script>

<audio id="newOrderSound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

</body>
</html>
