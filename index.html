<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Spot Cafe and Restaurant Digital Menu</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    padding:20px;
}

.header {
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.top-row {
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.top-row input {
    flex:1;
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

.search-box {
    margin-bottom:10px;
}

.search-box input {
    width:100%;
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

.categories {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.category-btn {
    padding:6px 12px;
    border:none;
    border-radius:20px;
    background:#e5e7eb;
    cursor:pointer;
}

.category-btn.active {
    background:#f59e0b;
    color:white;
}

.menu-container {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:15px;
}

.menu-item {
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.menu-item img {
    width:100%;
    height:120px;
    object-fit:cover;
}

.menu-content {
    padding:10px;
}

.qty-btn {
    padding:2px 6px;
    border:none;
    color:white;
    cursor:pointer;
}

.plus { background:green; }
.minus { background:red; }

.qty { margin:0 6px; }

.summary {
    background:white;
    padding:10px;
    margin-top:15px;
    border-radius:8px;
}

.buttons {
    margin-top:10px;
}

.buttons button {
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-right:5px;
}

.place { background:#4CAF50; color:white; }
.reset { background:orange; color:white; }
.cancel { background:red; color:white; }

.info-text {
    margin-top:6px;
    font-size:13px;
    color:#555;
}

.dialog-overlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.dialog-box {
    background:white;
    padding:20px;
    border-radius:8px;
    width:320px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
    <div style="float:center;">🍽 Food Spot Cafe and Restaurant Digital Menu</div>
    <div id="datetime" style="float:right;font-size:14px;"></div>
    <div style="clear:both;"></div>
</div>

<div class="top-row">
    <input type="text" id="customerName" placeholder="👤 Your Name (Optional)">
    <input type="text" id="mobile" placeholder="📱 +971XXXXXXXXX">
    <input type="text" id="address" placeholder="🏠 Address (Optional)">
</div>

<div class="search-box" style="text-align:center;">
    <input type="text" id="searchBox" 
           style="width:50%;" 
           placeholder="🔍 Search menu items..." 
           onkeyup="searchMenu()">
</div>

<div class="categories">
    <button class="category-btn">Arabian Grill</button>
    <button class="category-btn">Burgers</button>
    <button class="category-btn">Pizzas</button>
    <button class="category-btn">Chinese</button>
    <button class="category-btn">Indian</button>
    <button class="category-btn">Desserts</button>
    <button class="category-btn active">Beverages</button>
    <button class="category-btn">Cold Mezza</button>
    <button class="category-btn">Hot Mezza</button>
</div>

<div class="menu-container" id="menuContainer"></div>

<div class="summary">
    Subtotal: <b><span id="subtotal">0</span> AED</b><br>
    VAT (5%): <b><span id="vat">0</span> AED</b>
    <hr>
    Total Amount: <b><span id="total">0</span> AED</b>

    <div class="buttons">
        <button id="placeBtn" class="place" onclick="placeOrder()">Place Order</button>
        <button id="resetBtn" class="reset" onclick="resetOrder()" disabled>Reset</button>
        <button id="cancelBtn" class="cancel" onclick="cancelOrder()" disabled>Cancel Order</button>
    </div>

    <div id="infoText" class="info-text">
        You can cancel your order within 2 mins.
    </div>
</div>

<div id="dialog" class="dialog-overlay">
    <div class="dialog-box">
        <p id="dialogMsg"></p>
        <button onclick="closeDialog()">OK</button>
    </div>
</div>

<script>

const menuData = {
"Arabian Grill": generateItems("ag",25),
"Burgers": generateItems("bg",18),
"Pizzas": generateItems("pz",22),
"Chinese": generateItems("ch",20),
"Indian": generateItems("in",19),
"Desserts": generateItems("ds",12),
"Beverages": generateItems("bv",10),
"Cold Mezza": generateItems("cm",15),
"Hot Mezza": generateItems("hm",17)
};

function generateItems(prefix, basePrice){
    let arr=[];
    for(let i=1;i<=10;i++){
        arr.push({
            id: prefix+i,
            name: prefix.toUpperCase()+" Item "+i,
            price: basePrice+i
        });
    }
    return arr;
}

let currentCategory="Arabian Grill";
let items=menuData[currentCategory];
let cart = {};
let counter = 1;
let timerInterval;

/* ✅ DEFAULT ACTIVE = ARABIAN GRILL */
document.querySelectorAll(".category-btn").forEach(btn=>{
    if(btn.innerText==="Arabian Grill"){
        btn.classList.add("active");
    } else {
        btn.classList.remove("active");
    }

    btn.addEventListener("click",function(){
        loadCategory(this.innerText,this);
    });
});

function loadCategory(category,btn){
    currentCategory=category;
    items=menuData[category];
    document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    loadMenu(items);
}

/* LOAD MENU FUNCTION */
function loadMenu(data){
    const container=document.getElementById("menuContainer");
    container.innerHTML="";
    data.forEach(item=>{
        container.innerHTML+=`
        <div class="menu-item" data-name="${item.name}">
            <img src="https://picsum.photos/300/200?random=${item.id}">
            <div class="menu-content">
                <b>${item.name}</b><br>
                Fresh prepared delicious item.<br>
                AED ${item.price}
                <button class="qty-btn minus" onclick="updateQty('${item.id}',-1)">-</button>
                <span class="qty" id="qty-${item.id}">0</span>
                <button class="qty-btn plus" onclick="updateQty('${item.id}',1)">+</button>
            </div>
        </div>`;
    });
}

function updateQty(id,change){
    const el=document.getElementById("qty-"+id);
    let qty=parseInt(el.innerText)+change;
    if(qty<0) qty=0;
    el.innerText=qty;
    if(qty===0) delete cart[id];
    else cart[id]=qty;
    calculate();
    document.getElementById("resetBtn").disabled=Object.keys(cart).length===0;
}

function calculate(){
    let subtotal=0;
    Object.keys(cart).forEach(id=>{
        Object.values(menuData).forEach(cat=>{
            cat.forEach(i=>{
                if(i.id===id) subtotal+=i.price*cart[id];
            });
        });
    });

    let vat=subtotal*0.05;
    let total=subtotal+vat;

    document.getElementById("subtotal").innerText=subtotal.toFixed(2);
    document.getElementById("vat").innerText=vat.toFixed(2);
    document.getElementById("total").innerText=total.toFixed(2);
}

/* ✅ GLOBAL SEARCH */
function searchMenu(){
    const val=document.getElementById("searchBox").value.toLowerCase();

    if(val===""){
        loadMenu(menuData[currentCategory]);
        return;
    }

    let results=[];
    Object.values(menuData).forEach(cat=>{
        cat.forEach(item=>{
            if(item.name.toLowerCase().includes(val)){
                results.push(item);
            }
        });
    });

    loadMenu(results);
}

/* ✅ SUCCESS DIALOG WITH TOTALS */
function placeOrder(){
    if(Object.keys(cart).length===0){
        showDialog("Please select at least one menu item.");
        return;
    }

    const mobile=document.getElementById("mobile").value.trim();
    if(!mobile){
        showDialog("Mobile number is mandatory.");
        return;
    }

    let name=document.getElementById("customerName").value.trim();
    if(!name) name="New Customer "+(counter++);

    let address=document.getElementById("address").value.trim();
    if(!address) address="NA";

    const subtotal=document.getElementById("subtotal").innerText;
    const vat=document.getElementById("vat").innerText;
    const total=document.getElementById("total").innerText;

    showDialog(
`Order Placed Successfully!!!

Subtotal: ${subtotal} AED
VAT: ${vat} AED
Total: ${total} AED

Expected time to deliver: 20 mins.
Contact Info: +971552385011`
    );

    startTimer();
    resetOrder();

    fetch("https://avijitemail01.app.n8n.cloud/webhook-test/restaurant-qrcode-order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,mobile,address,cart})
    });
}

function startTimer(){
    let seconds=120;
    const btn=document.getElementById("placeBtn");
    btn.disabled=true;
    document.getElementById("infoText").innerText="You can place your new order again after 2 mins.";

    timerInterval=setInterval(()=>{
        seconds--;
        btn.innerText="Place Order ("+seconds+"s)";
        if(seconds<=0){
            clearInterval(timerInterval);
            btn.disabled=false;
            btn.innerText="Place Order";
            document.getElementById("infoText").innerText="You can cancel your order within 2 mins.";
        }
    },1000);
}

function resetOrder(){
    cart={};
    document.querySelectorAll(".qty").forEach(e=>e.innerText="0");
    calculate();
    document.getElementById("resetBtn").disabled=true;
    document.getElementById("cancelBtn").disabled=true;
}

function cancelOrder(){
    resetOrder();
    showDialog("Order Cancelled Successfully.");
}

function showDialog(msg){
    document.getElementById("dialogMsg").innerText=msg;
    document.getElementById("dialog").style.display="flex";
}
function closeDialog(){
    document.getElementById("dialog").style.display="none";
}

/* DATE & TIME */
function updateDateTime(){
    const now=new Date();
    document.getElementById("datetime").innerText=now.toLocaleString();
}
setInterval(updateDateTime,1000);
updateDateTime();

/* DEFAULT LOAD ARABIAN GRILL */
loadMenu(menuData["Arabian Grill"]);

</script>

</body>
</html>
