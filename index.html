<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Spot Cafe and Restaurant Digital Menu</title>

<style>
body {
  font-family: Arial;
  padding: 12px;
  background:#f4f6f9;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#datetime {
  font-size:12px;
  color:gray;
}

h2 {
  text-align:center;
  margin:5px 0 10px;
  font-size:18px;
}

.input-row {
  display:flex;
  gap:6px;
  margin-bottom:6px;
}

.field {
  display:flex;
  align-items:center;
  background:white;
  padding:5px 8px;
  border-radius:6px;
  flex:1;
}

.field span {
  margin-right:5px;
  font-size:14px;
}

.field input {
  border:none;
  outline:none;
  width:100%;
  font-size:12px;
}

textarea {
  width:100%;
  padding:6px;
  font-size:12px;
  border-radius:6px;
  border:1px solid #ddd;
  resize:none;
  height:50px;
  margin:6px 0;
}

.category {
  margin-bottom:10px;
  background:white;
  border-radius:8px;
  padding:8px;
}

.category-header {
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.items {
  display:none;
  margin-top:8px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
  gap:6px;
}

.item {
  background:#fafafa;
  padding:5px;
  border-radius:6px;
  text-align:center;
  font-size:11px;
}

.item img {
  width:100%;
  height:50px;
  object-fit:cover;
  border-radius:5px;
}

.button-row {
  display:flex;
  gap:8px;
  margin-top:6px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
}

.place-btn { background:green; color:white; }
.cancel-btn { background:red; color:white; }

.info {
  font-size:11px;
  color:gray;
  margin-top:4px;
}

@keyframes clickEffect {
  0% { transform: scale(1); }
  50% { transform: scale(0.9); }
  100% { transform: scale(1); }
}
.click-animate {
  animation: clickEffect 0.3s ease;
}
</style>
</head>

<body>

<div class="top-bar">
  <div></div>
  <div id="datetime"></div>
</div>

<h2>🍽 Food Spot Cafe and Restaurant Digital Menu</h2>

<!-- Name + Phone + Address -->
<div class="input-row">
  <div class="field">
    <span>👤</span>
    <input type="text" id="name" placeholder="Your Name (Optional)">
  </div>
  <div class="field">
    <span>📱</span>
    <input type="text" id="phone" placeholder="WhatsApp Number (+971...)" required>
  </div>
  <div class="field">
    <span>🏠</span>
    <input type="text" id="address" placeholder="Address (Room/Flat, Building, Landmark)">
  </div>
</div>

<textarea id="notes" placeholder="Extra Notes (Less spicy, No onion, etc.)"></textarea>

<div id="menu"></div>

<h3>Total: <span id="total">0</span> AED</h3>

<div class="button-row">
  <button class="place-btn" id="placeBtn" onclick="submitOrder(this)">👆 Place Order</button>
  <button class="cancel-btn" id="cancelBtn" onclick="cancelOrder(this)">Cancel Order</button>
</div>

<div class="info" id="placeInfo"></div>
<div class="info" id="cancelInfo">
You can cancel your order within 2 minutes after placing it.
</div>

<script>

// Live Date Time
function updateDateTime(){
  document.getElementById("datetime").innerText = new Date().toLocaleString();
}
setInterval(updateDateTime,1000);
updateDateTime();

// Menu Generator
const menuData = {
  "Burgers": generateItems("Burger",20),
  "Pizzas": generateItems("Pizza",30),
  "Chinese": generateItems("Chinese Dish",25),
  "Indian": generateItems("Indian Dish",22),
  "Desserts": generateItems("Dessert",15)
};

function generateItems(name, price){
  let items=[];
  for(let i=1;i<=10;i++){
    items.push({
      name:name+" "+i,
      price:price+i,
      img:"https://picsum.photos/200?random="+Math.random()
    });
  }
  return items;
}

const menuDiv=document.getElementById("menu");

for(let category in menuData){
  let cat=document.createElement("div");
  cat.className="category";
  cat.innerHTML=`
    <div class="category-header" onclick="toggleCategory(this)">
      ${category} ▼
    </div>
    <div class="items"></div>
  `;
  let itemsDiv=cat.querySelector(".items");

  menuData[category].forEach(item=>{
    let div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <img src="${item.img}">
      <div>
        <input type="checkbox" value="${item.name}" data-price="${item.price}">
        ${item.name}<br>${item.price} AED
      </div>
    `;
    itemsDiv.appendChild(div);
  });

  menuDiv.appendChild(cat);
}

function toggleCategory(header){
  let items=header.nextElementSibling;
  items.style.display=items.style.display==="grid"?"none":"grid";
}

// Total
document.addEventListener("change",function(e){
  if(e.target.type==="checkbox") calculateTotal();
});

function calculateTotal(){
  let total=0;
  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    if(cb.checked) total+=parseInt(cb.dataset.price);
  });
  document.getElementById("total").innerText=total;
}

// Submit Order
async function submitOrder(btn){

  btn.classList.add("click-animate");
  setTimeout(()=>btn.classList.remove("click-animate"),300);

  let phone=document.getElementById("phone").value;
  if(!phone){
    alert("Phone number is mandatory");
    return;
  }

  let items=[];
  let total=0;

  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    if(cb.checked){
      items.push(cb.value+" - "+cb.dataset.price+" AED");
      total+=parseInt(cb.dataset.price);
    }
  });

  const data={
    orderId:localStorage.getItem("orderId")||null,
    name:document.getElementById("name").value||"Customer",
    phone:phone,
    address:document.getElementById("address").value,
    notes:document.getElementById("notes").value,
    items:items.join(", "),
    total:total,
    status:"Active"
  };

  const res=await fetch("https://avijitemail01.app.n8n.cloud/webhook/restaurant-qrcode-order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const result=await res.json();

  if(result.orderId){
    localStorage.setItem("orderId",result.orderId);
    localStorage.setItem("orderTime",Date.now());
  }

  btn.disabled=true;
  document.getElementById("placeInfo").innerText="You can place your order again in 2 minutes.";

  setTimeout(()=>{
    btn.disabled=false;
    document.getElementById("placeInfo").innerText="";
  },120000);

  alert("Order placed successfully!");
}

// Cancel Order
async function cancelOrder(btn){

  let orderId=localStorage.getItem("orderId");
  let orderTime=localStorage.getItem("orderTime");

  if(!orderId){
    alert("No order found.");
    return;
  }

  if(Date.now()-orderTime > 120000){
    alert("Cancellation window expired.");
    btn.disabled=true;
    return;
  }

  await fetch("https://avijitemail01.app.n8n.cloud/webhook/restaurant-qrcode-order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      orderId:orderId,
      status:"Cancelled"
    })
  });

  btn.disabled=true;
  document.getElementById("cancelInfo").innerText="Order cancelled successfully.";
}
</script>

</body>
</html>
