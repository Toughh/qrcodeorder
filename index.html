<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
  background:#f4f6f9;
}

h2 { text-align:center; }

.category {
  margin-bottom:15px;
  background:white;
  border-radius:10px;
  padding:10px;
}

.category-header {
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.items {
  display:none;
  margin-top:10px;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap:10px;
}

.item {
  background:#fafafa;
  padding:8px;
  border-radius:8px;
  text-align:center;
  font-size:14px;
}

.item img {
  width:100%;
  height:80px;
  object-fit:cover;
  border-radius:6px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:green;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.cancel-btn {
  background:red;
}

input[type="text"] {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<h2>🍽 Digital Menu</h2>

<input type="text" id="name" placeholder="Your Name (Optional)">
<input type="text" id="phone" placeholder="WhatsApp Number (+971...)" required>

<div id="menu"></div>

<h3>Total: <span id="total">0</span> AED</h3>

<button onclick="submitOrder()">Place / Update Order</button>
<button class="cancel-btn" onclick="cancelOrder()">Cancel Order</button>

<script>

// AUTO CUSTOMER NAME LOGIC
let customerCounter = localStorage.getItem("customerCounter") || 1;

function getCustomerName() {
  let name = document.getElementById("name").value;
  if (!name) {
    name = "Customer" + customerCounter;
    localStorage.setItem("customerCounter", ++customerCounter);
  }
  return name;
}

// MENU DATA (5 Categories × 10 Items)

const menuData = {
  "Burgers": generateItems("Burger", 20),
  "Pizzas": generateItems("Pizza", 30),
  "Chinese": generateItems("Chinese Dish", 25),
  "Indian": generateItems("Indian Dish", 22),
  "Desserts": generateItems("Dessert", 15)
};

function generateItems(name, price) {
  let items = [];
  for (let i=1; i<=10; i++) {
    items.push({
      name: name + " " + i,
      price: price + i,
      img: "https://picsum.photos/200?random=" + Math.random()
    });
  }
  return items;
}

// RENDER MENU

const menuDiv = document.getElementById("menu");

for (let category in menuData) {
  let catDiv = document.createElement("div");
  catDiv.className = "category";

  catDiv.innerHTML = `
    <div class="category-header" onclick="toggleCategory(this)">
      ${category} ▼
    </div>
    <div class="items"></div>
  `;

  let itemsDiv = catDiv.querySelector(".items");
  itemsDiv.style.display = "grid";

  menuData[category].forEach(item => {
    let itemDiv = document.createElement("div");
    itemDiv.className = "item";
    itemDiv.innerHTML = `
      <img src="${item.img}">
      <div>
        <input type="checkbox" value="${item.name}" data-price="${item.price}">
        ${item.name}<br>${item.price} AED
      </div>
    `;
    itemsDiv.appendChild(itemDiv);
  });

  itemsDiv.style.display = "none";
  menuDiv.appendChild(catDiv);
}

function toggleCategory(header) {
  let items = header.nextElementSibling;
  items.style.display = items.style.display === "grid" ? "none" : "grid";
}

// TOTAL CALCULATION

document.addEventListener("change", function(e) {
  if (e.target.type === "checkbox") calculateTotal();
});

function calculateTotal() {
  let total = 0;
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    if (cb.checked) total += parseInt(cb.dataset.price);
  });
  document.getElementById("total").innerText = total;
}

// SUBMIT / UPDATE ORDER

async function submitOrder() {

  let phone = document.getElementById("phone").value;
  if (!phone) {
    alert("Phone number is mandatory");
    return;
  }

  let items = [];
  let total = 0;

  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    if (cb.checked) {
      items.push(cb.value + " - " + cb.dataset.price + " AED");
      total += parseInt(cb.dataset.price);
    }
  });

  let orderId = localStorage.getItem("orderId");

  const data = {
    orderId: orderId || null,
    name: getCustomerName(),
    phone: phone,
    items: items.join(", "),
    total: total,
    status: "Active"
  };

  const res = await fetch("https://avijitemail01.app.n8n.cloud/webhook/restaurant-qrcode-order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (!orderId && result.orderId) {
    localStorage.setItem("orderId", result.orderId);
  }

  alert("Order Submitted / Updated Successfully!");
}

// CANCEL ORDER

async function cancelOrder() {

  let orderId = localStorage.getItem("orderId");
  if (!orderId) {
    alert("No active order found.");
    return;
  }

  await fetch("https://avijitemail01.app.n8n.cloud/webhook/restaurant-qrcode-order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      orderId: orderId,
      status: "Cancelled"
    })
  });

  alert("Order Cancelled");
}

</script>

</body>
</html>
