<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Spot Cafe and Restaurant Digital Menu</title>

<style>
body {
  font-family: Arial;
  padding: 12px;
  background:#f4f6f9;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#datetime {
  font-size:12px;
  color:gray;
}

h2 {
  text-align:center;
  margin:20px 0 25px;
  font-size:18px;
}

/* INPUT ROW */
.input-row {
  display:flex;
  gap:6px;
  margin-bottom:8px;
}

.field {
  display:flex;
  align-items:center;
  background:white;
  padding:6px 8px;
  border-radius:6px;
  flex:1;
}

.field span {
  margin-right:5px;
  font-size:14px;
}

.field input {
  border:none;
  outline:none;
  width:100%;
  font-size:12px;
}

/* SEARCH */
.search-row {
  margin-bottom:10px;
}

.search-box {
  display:flex;
  align-items:center;
  background:white;
  padding:6px 8px;
  border-radius:6px;
}

.search-box span {
  margin-right:6px;
}

.search-box input {
  border:none;
  outline:none;
  width:100%;
  font-size:12px;
}

/* CATEGORY BUTTONS */
#categoryButtons {
  display:flex;
  gap:6px;
  overflow-x:auto;
  margin-bottom:10px;
}

.category-btn {
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:#e0e0e0;
  cursor:pointer;
  font-size:12px;
  white-space:nowrap;
}

.category-btn.active {
  background:green;
  color:white;
}

/* MENU ITEM */
.menu-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

.menu-left {
  display:flex;
  align-items:center;
  gap:8px;
}

.menu-left img {
  width:55px;
  height:55px;
  border-radius:8px;
  object-fit:cover;
}

.menu-info {
  font-size:12px;
}

.qty-control {
  display:flex;
  align-items:center;
  gap:6px;
}

.qty-control button {
  width:24px;
  height:24px;
  border:none;
  border-radius:50%;
  font-size:14px;
  cursor:pointer;
}

.minus { background:#ddd; }
.plus { background:green; color:white; }

textarea {
  width:100%;
  box-sizing:border-box;
  padding:6px;
  font-size:12px;
  border-radius:6px;
  border:1px solid #ddd;
  resize:none;
  height:50px;
  margin:10px 0;
}

/* BILLING */
.bill-box {
  background:white;
  padding:8px;
  border-radius:6px;
  font-size:13px;
  margin-top:8px;
}

/* BUTTONS */
.button-row {
  display:flex;
  gap:8px;
  margin-top:8px;
}

button {
  padding:6px 12px;
  border:none;
  border-radius:5px;
  font-size:12px;
  cursor:pointer;
}

.place-btn { background:green; color:white; }
.reset-btn { background:orange; color:white; }
.cancel-btn { background:red; color:white; }

.info {
  font-size:11px;
  color:gray;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="top-bar">
  <div></div>
  <div id="datetime"></div>
</div>

<h2>🍽 Food Spot Cafe and Restaurant Digital Menu</h2>

<div class="input-row">
  <div class="field">
    <span>👤</span>
    <input type="text" id="name" placeholder="Your Name (Optional)">
  </div>
  <div class="field">
    <span>📱</span>
    <input type="text" id="phone" placeholder="WhatsApp Number (+971...)" required>
  </div>
  <div class="field">
    <span>🏠</span>
    <input type="text" id="address" placeholder="Address (Optional - Room/Flat No, Building Name, Nearest Landmark)">
  </div>
</div>

<!-- SEARCH -->
<div class="search-row">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Search menu items..." onkeyup="searchItems()">
  </div>
</div>

<div id="categoryButtons"></div>
<div id="menuContainer"></div>

<textarea id="notes" placeholder="Extra Notes (Less spicy, No onion, etc.)"></textarea>

<div class="bill-box">
  <div>Subtotal: <b><span id="subtotal">0.00</span> AED</b></div>
  <div>VAT (5%): <b><span id="vat">0.00</span> AED</b></div>
  <hr>
  <div style="font-size:15px;">
    Total Amount: <b><span id="grandTotal">0.00</span> AED</b>
  </div>
</div>

<div class="button-row">
  <button class="place-btn">Place Order</button>
  <button class="reset-btn" onclick="resetOrder()">Reset</button>
  <button class="cancel-btn">Cancel Order</button>
</div>

<script>

// LIVE TIME
function updateDateTime(){
  document.getElementById("datetime").innerText=new Date().toLocaleString();
}
setInterval(updateDateTime,1000);
updateDateTime();

// MENU DATA
const menuData={
  "Burgers":generateItems("Burger",20),
  "Chinese":generateItems("Chinese Dish",25),
  "Pizzas":generateItems("Pizza",30),
  "Indian":generateItems("Indian Dish",22),
  "Desserts":generateItems("Dessert",15)
};

function generateItems(name,price){
  let arr=[];
  for(let i=1;i<=10;i++){
    arr.push({
      id:name+i,
      name:name+" "+i,
      price:price+i,
      img:"https://picsum.photos/200?random="+Math.random(),
      qty:0
    });
  }
  return arr;
}

let currentCategory="Burgers";

const categoryButtons=document.getElementById("categoryButtons");
const menuContainer=document.getElementById("menuContainer");

Object.keys(menuData).forEach(cat=>{
  let btn=document.createElement("button");
  btn.innerText=cat;
  btn.className="category-btn";
  if(cat==="Burgers") btn.classList.add("active");

  btn.onclick=()=>{
    currentCategory=cat;
    document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderMenu();
  };
  categoryButtons.appendChild(btn);
});

function renderMenu(list=null){
  menuContainer.innerHTML="";
  let items=list || menuData[currentCategory];

  items.forEach(item=>{
    let div=document.createElement("div");
    div.className="menu-item";
    div.innerHTML=`
      <div class="menu-left">
        <img src="${item.img}">
        <div class="menu-info">
          <div><b>${item.name}</b></div>
          <div>${item.price} AED</div>
        </div>
      </div>
      <div class="qty-control">
        <button class="minus" onclick="updateQty('${item.id}',-1)">-</button>
        <span id="qty-${item.id}">${item.qty}</span>
        <button class="plus" onclick="updateQty('${item.id}',1)">+</button>
      </div>
    `;
    menuContainer.appendChild(div);
  });
}

function updateQty(id,change){
  Object.values(menuData).forEach(cat=>{
    cat.forEach(item=>{
      if(item.id===id){
        item.qty=Math.max(0,item.qty+change);
        document.getElementById("qty-"+id).innerText=item.qty;
      }
    });
  });
  calculateTotal();
}

function calculateTotal(){
  let subtotal=0;
  Object.values(menuData).forEach(cat=>{
    cat.forEach(item=>{
      subtotal+=item.qty*item.price;
    });
  });

  let vat=subtotal*0.05;
  let total=subtotal+vat;

  document.getElementById("subtotal").innerText=subtotal.toFixed(2);
  document.getElementById("vat").innerText=vat.toFixed(2);
  document.getElementById("grandTotal").innerText=total.toFixed(2);
}

// SEARCH FUNCTION
function searchItems(){
  let value=document.getElementById("searchInput").value.toLowerCase();

  if(value===""){
    renderMenu();
    return;
  }

  let results=[];
  Object.values(menuData).forEach(cat=>{
    cat.forEach(item=>{
      if(item.name.toLowerCase().includes(value)){
        results.push(item);
      }
    });
  });

  renderMenu(results);
}

function resetOrder(){
  Object.values(menuData).forEach(cat=>{
    cat.forEach(item=>item.qty=0);
  });
  renderMenu();
  calculateTotal();
  document.getElementById("notes").value="";
}

renderMenu();
</script>

</body>
</html>
