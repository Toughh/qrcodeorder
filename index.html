<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu</title>

    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div class="header">
        <div class="restaurant-title">
            🍽 <span id="restaurantName">Loading...</span>
        </div>
        <div id="datetime" class="restaurant-subtitle"></div>
    </div>

    <!-- BOOKING SECTION -->
    <div class="booking-card">
        <div class="booking-grid">

            <div class="form-group">
                <label>Full Name</label>
                <div class="input-row">
                    <input type="text" id="customerName" placeholder="Your name (Optional)">
                </div>
            </div>

            <div class="form-group">
                <label id="mobileLabel">Mobile Number</label>
                <div class="input-row">
                    <span class="country-code">+971</span>
                    <input type="tel" id="mobile" placeholder="55XXXXXXX" inputmode="numeric">
                </div>
                <div class="tooltip-text mandatory">Mandatory If WhatsApp Number Not Provided</div>
            </div>

            <div class="form-group">
                <label id="whatsappLabel">WhatsApp Number</label>
                <div class="input-row">
                    <input type="tel" id="whatsapp" placeholder="WhatsApp Number" inputmode="numeric">
                </div>
                <div class="tooltip-text mandatory">Mandatory If Mobile Number Not Provided</div>
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <div class="input-row">
                    <textarea id="address" rows="1" placeholder="Flat No, Building Name (Optional)"></textarea>
                </div>
            </div>

            <div id="tableNumberContainer">
                <label>Table Number</label>
                <input type="text" id="tableNumber" placeholder="Enter Table Number">
            </div>

        </div>
    </div>

    <div class="search-box" style="text-align:center;">
        <input type="text" id="searchBox" placeholder="🔍 Search menu items..." onkeyup="searchMenu()">
    </div>

    <div class="categories">
    </div>

    <div class="menu-container" id="menuContainer"></div>
    <div id="noResults" class="no-results" style="display:none;">
        <div class="no-results-box">

            <div class="no-title">🔍 No exact match found</div>

            <div id="didYouMean" class="suggestion"></div>

            <div class="popular-title">⭐ Popular Items</div>
            <div id="popularItems" class="popular-items"></div>

            <div class="popular-title">🍽 Browse Categories</div>
            <div id="suggestedCategories" class="suggested-categories"></div>

        </div>
    </div>

    <div class="form-group" style="margin:25px 0 20px 0;">
        <label>Want to Customize?</label>
        <div class="input-row">
            <textarea id="customNote" rows="2" placeholder="Our experienced Chef will not let you down..."></textarea>
        </div>
    </div>

    Subtotal: <b><span id="subtotal">0</span> AED</b><br>
    VAT (5%): <b><span id="vat">0</span> AED</b>
    <hr>
    Total Amount: <b><span id="total">0</span> AED</b>

    <div class="buttons">
        <button id="placeBtn" class="place" onclick="placeOrder()">Place Order</button>
        <button id="resetBtn" class="reset" onclick="resetOrder()" disabled>Reset</button>
    </div>
    <div id="infoText" class="info-text"></div>

    <div id="dialog" class="dialog-overlay">
        <div class="dialog-box">
            <p id="dialogMsg"></p>
            <button onclick="closeDialog()">OK</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/order.js"></script>
    <script src="js/app.js"></script>

    <script>
        const branches = [
            { name: "Al Nahda", lat: 25.2985, lon: 55.3734 },
            { name: "Bur Dubai", lat: 25.2622, lon: 55.2972 }
        ];

        let menuData = {};
        let allItems = [];

        let currentCategory = localStorage.getItem("currentCategory") || null;
        let cart = JSON.parse(localStorage.getItem("cart")) || {};
        let counter = 1;
        let timerInterval;
    </script>

</body>

</html>
