<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Restaurant Menu</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

.menu-item {
    margin-bottom: 15px;
}

button {
    cursor: pointer;
}

/* Small Action Buttons */
.action-btn {
    padding: 5px 10px;
    font-size: 12px;
    margin-right: 5px;
}

/* + and - Buttons */
.qty-btn {
    padding: 2px 6px;
    font-size: 12px;
    border: none;
    color: white;
}

.plus {
    background-color: green;
}

.minus {
    background-color: red;
}

.qty {
    margin: 0 6px;
    font-weight: bold;
}

/* Info text */
.order-info {
    font-size: 12px;
    color: #555;
    margin-top: 8px;
}

/* Dialog */
.dialog-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.dialog-box {
    background: white;
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    width: 300px;
}

.dialog-box button {
    margin-top: 10px;
    padding: 5px 10px;
}
</style>
</head>

<body>

<h2>Restaurant Menu</h2>

<div class="menu-item">
    Chicken Burger - AED 20
    <button class="qty-btn minus" onclick="updateQty('burger', -1)">-</button>
    <span class="qty" id="qty-burger">0</span>
    <button class="qty-btn plus" onclick="updateQty('burger', 1)">+</button>
</div>

<div class="menu-item">
    Pizza - AED 30
    <button class="qty-btn minus" onclick="updateQty('pizza', -1)">-</button>
    <span class="qty" id="qty-pizza">0</span>
    <button class="qty-btn plus" onclick="updateQty('pizza', 1)">+</button>
</div>

<h3>Total: AED <span id="totalAmount">0</span></h3>

<div>
    <button id="placeOrderBtn" class="action-btn" onclick="placeOrder()">Place Order</button>
    <button id="resetBtn" class="action-btn" onclick="manualReset()" disabled>Reset</button>
    <button id="cancelOrderBtn" class="action-btn" onclick="cancelOrder()" disabled>Cancel Order</button>
</div>

<div class="order-info">
    ℹ️ You can cancel your order within 2 minutes.
</div>

<!-- Dialog -->
<div id="customDialog" class="dialog-overlay">
    <div class="dialog-box">
        <p id="dialogMessage"></p>
        <button onclick="closeDialog()">OK</button>
    </div>
</div>

<script>
let cart = {};
let totalAmount = 0;
let orderTimer = null;

/* Item Prices */
const prices = {
    burger: 20,
    pizza: 30
};

/* Quantity Update */
function updateQty(item, change) {
    let qtyElement = document.getElementById("qty-" + item);
    let currentQty = parseInt(qtyElement.innerText);

    currentQty += change;
    if (currentQty < 0) currentQty = 0;

    qtyElement.innerText = currentQty;

    if (currentQty === 0) {
        delete cart[item];
    } else {
        cart[item] = currentQty;
    }

    calculateTotal();

    // Enable reset only if any item selected
    document.getElementById("resetBtn").disabled = Object.keys(cart).length === 0;
}

/* Calculate Total */
function calculateTotal() {
    totalAmount = 0;
    for (let item in cart) {
        totalAmount += prices[item] * cart[item];
    }
    document.getElementById("totalAmount").innerText = totalAmount;
}

/* Place Order */
function placeOrder() {
    if (Object.keys(cart).length === 0) {
        showDialog("You need to select at least one item.");
        return;
    }

    document.getElementById("placeOrderBtn").disabled = true;
    document.getElementById("cancelOrderBtn").disabled = false;

    sendOrderToN8N();

    showDialog("Order placed successfully!");

    resetOrderState();

    orderTimer = setTimeout(() => {
        document.getElementById("placeOrderBtn").disabled = false;
        showDialog("You can place your new order again now.");
    }, 120000);
}

/* Cancel Order */
function cancelOrder() {
    clearTimeout(orderTimer);

    resetOrderState();

    document.getElementById("placeOrderBtn").disabled = true;
    document.getElementById("cancelOrderBtn").disabled = true;

    showDialog("Order cancelled successfully.");

    setTimeout(() => {
        document.getElementById("placeOrderBtn").disabled = false;
        showDialog("You can place your new order again now.");
    }, 120000);
}

/* Manual Reset */
function manualReset() {
    resetOrderState();
}

/* Reset Everything */
function resetOrderState() {
    cart = {};
    totalAmount = 0;

    document.querySelectorAll(".qty").forEach(el => {
        el.innerText = "0";
    });

    document.getElementById("totalAmount").innerText = "0";
    document.getElementById("resetBtn").disabled = true;
    document.getElementById("cancelOrderBtn").disabled = true;
}

/* Dialog */
function showDialog(message) {
    document.getElementById("dialogMessage").innerText = message;
    document.getElementById("customDialog").style.display = "flex";
}

function closeDialog() {
    document.getElementById("customDialog").style.display = "none";
}

/* n8n Integration */
function sendOrderToN8N() {
    fetch("YOUR_N8N_WEBHOOK_URL", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            items: cart,
            total: totalAmount
        })
    });
}
</script>

</body>
</html>
